<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VibeApply</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>VibeApply</h1>
      <p class="tagline">AI-powered Workday autofill</p>
    </header>

    <section class="card">
      <label for="apiKey">Google Gemini API Key</label>
      <div class="row">
        <input
          id="apiKey"
          type="password"
          placeholder="AIza..."
          autocomplete="off"
          spellcheck="false"
        >
        <button id="saveKeyBtn" class="btn-secondary">Save</button>
      </div>
      <p id="keyStatus" class="status-line">Not set</p>
    </section>

    <section class="card">
      <label for="resumeFile">Resume (PDF)</label>
      <div class="row">
        <input id="resumeFile" type="file" accept=".pdf">
        <button id="saveResumeBtn" class="btn-secondary">Save</button>
      </div>
      <p id="resumeStatus" class="status-line">Not uploaded</p>
    </section>

    <section class="card">
      <details>
        <summary class="card-summary">
          <span>Additional Info</span>
          <span id="profileStatus" class="status-line">0 / 10 filled</span>
        </summary>
        <div class="profile-fields">
          <div class="field-group">
            <label for="workAuthorization">Work Authorization</label>
            <select id="workAuthorization">
              <option value="">— Not specified —</option>
              <option>Authorized to work without sponsorship</option>
              <option>Will require sponsorship now or in the future</option>
              <option>Citizen / Permanent resident</option>
              <option>Not authorized</option>
            </select>
          </div>

          <div class="field-group">
            <label for="sponsorshipNeeded">Visa Sponsorship Needed</label>
            <select id="sponsorshipNeeded">
              <option value="">— Not specified —</option>
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>

          <div class="field-group">
            <label for="noticePeriod">Notice Period</label>
            <input id="noticePeriod" type="text" placeholder="e.g. 30 days, Immediate">
          </div>

          <div class="field-group">
            <label for="expectedSalary">Expected Salary</label>
            <input id="expectedSalary" type="text" placeholder="e.g. $120,000 or Negotiable">
          </div>

          <div class="field-group">
            <label for="startDate">Available Start Date</label>
            <input id="startDate" type="text" placeholder="e.g. 2026-06-01 or Immediate">
          </div>

          <div class="field-group">
            <label for="howDidYouHear">How Did You Hear About Us</label>
            <input id="howDidYouHear" type="text" placeholder="e.g. LinkedIn, Referral">
          </div>

          <div class="field-group">
            <label for="willingToRelocate">Willing to Relocate</label>
            <select id="willingToRelocate">
              <option value="">— Not specified —</option>
              <option>Yes</option>
              <option>No</option>
              <option>Negotiable</option>
            </select>
          </div>

          <div class="field-group">
            <label for="gender">Gender (optional)</label>
            <select id="gender">
              <option value="">— Not specified —</option>
              <option>Male</option>
              <option>Female</option>
              <option>Non-binary</option>
              <option>Prefer to self-describe</option>
              <option>Decline to state</option>
            </select>
          </div>

          <div class="field-group">
            <label for="veteranStatus">Veteran Status (optional)</label>
            <select id="veteranStatus">
              <option value="">— Not specified —</option>
              <option>I am not a protected veteran</option>
              <option>I am a protected veteran</option>
              <option>Decline to state</option>
            </select>
          </div>

          <div class="field-group">
            <label for="disabilityStatus">Disability Status (optional)</label>
            <select id="disabilityStatus">
              <option value="">— Not specified —</option>
              <option>No, I do not have a disability</option>
              <option>Yes, I have a disability</option>
              <option>Decline to state</option>
            </select>
          </div>

          <button id="saveProfileBtn" class="btn-secondary profile-save">Save profile</button>
        </div>
      </details>
    </section>

    <button id="autofillBtn" class="btn-primary" disabled>
      Autofill current page
    </button>

    <p id="hint" class="hint">
      Save your API key and resume, then open a Workday job page.
    </p>
  </div>

  <script src="../../vendor/pdfjs/pdf.min.js"></script>
  <script src="../lib/gemini.js"></script>
  <script src="popup.js"></script>
</body>
</html>
